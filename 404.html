<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - AgroGuardAI</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="mylogo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-xl); background: linear-gradient(160deg, #f0faf0 0%, #ffffff 60%); }
    .error-page__inner { text-align: center; max-width: 520px; }
    .error-page__code { font-size: clamp(5rem, 15vw, 9rem); font-weight: 800; color: var(--forest-green); opacity: 0.15; line-height: 1; letter-spacing: -0.04em; margin-bottom: var(--space-md); }
    .error-page__title { font-size: var(--text-3xl); font-weight: 800; color: var(--text-primary); margin-bottom: var(--space-md); letter-spacing: -0.02em; }
    .error-page__subtitle { font-size: var(--text-lg); color: var(--text-secondary); margin-bottom: var(--space-2xl); line-height: 1.6; }
    .error-page__actions { display: flex; gap: var(--space-md); justify-content: center; flex-wrap: wrap; }
    .error-page__logo { display: flex; align-items: center; justify-content: center; gap: var(--space-sm); font-weight: 700; font-size: var(--text-lg); color: var(--text-primary); text-decoration: none; margin-bottom: var(--space-3xl); }
    .error-page__logo:hover { color: var(--forest-green); }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-page__inner">
      <a href="index" class="error-page__logo">
        <span class="header__logo-icon">AG</span>
        AgroGuardAI
      </a>
      <div class="error-page__code">404</div>
      <h1 class="error-page__title">Field Not Found</h1>
      <p class="error-page__subtitle">This page doesn't exist — perhaps it was moved, or the link was mistyped. Let's get you back to solid ground.</p>
      <div class="error-page__actions">
        <a href="index" class="btn btn--primary btn--lg">Back to Home</a>
        <a href="contact" class="btn btn--outline btn--lg">Contact Support</a>
      </div>
    </div>
  </div>
</body>
</html>
